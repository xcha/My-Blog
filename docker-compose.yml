services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: blog_db
      POSTGRES_USER: blog_user
      POSTGRES_PASSWORD: Zdx08080.
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://blog_user:Zdx08080.@db:5432/blog_db?schema=public
      NEXTAUTH_URL: http://lianci.cloud:3000
      NEXTAUTH_SECRET: "Zdx08080."

      SEED_ADMIN_EMAIL: admin@lianci.cloud
      SEED_ADMIN_PASSWORD: Zdx08080.
      SEED_ADMIN_NAME: Admin
    volumes:
      # 让 public/uploads 持久化（你现在图片上传写这里）
      - uploads:/app/public/uploads
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2
    restart: always
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
